<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>dot. | Eventos</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:#070707;color:#f5f5f5;padding:20px}.wrap{max-width:1000px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.logo{font-size:28px;font-weight:800}.card{background:#111;border:1px solid #252525;border-radius:18px;padding:16px;margin:14px 0}label{display:block;margin:12px 0 6px;color:#ddd;font-size:14px}input,select{padding:14px;border-radius:12px;border:1px solid #333;background:#090909;color:#fff;font-size:16px;width:100%}.row{display:grid;grid-template-columns:1.5fr .7fr .7fr .7fr;gap:10px}.btn{border:0;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer}.primary{background:#fff;color:#000}.ghost{background:#222;color:#fff;border:1px solid #333}.muted{color:#aaa}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#fff;color:#000;border-radius:999px;padding:12px 18px;font-weight:800;opacity:0;pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #252525;padding:10px;text-align:left}.pill{border:1px solid #333;border-radius:999px;padding:4px 8px;font-size:12px}@media(max-width:760px){.row{grid-template-columns:1fr}table{font-size:13px}}</style></head><body><div id="toast" class="toast">Tudo certo</div><div class="wrap"><div class="top"><div><div class="logo">dot. eventos</div><div class="muted">Painel administrativo</div></div><div><a class="btn ghost" href="painel.html" style="text-decoration:none">Painel operação</a> <button class="btn ghost" onclick="logout()">Sair</button></div></div><div class="card"><h3>Criar evento</h3><div class="row"><div><label>Nome do evento</label><input id="name" placeholder="Ex.: SelfRun Natal" oninput="suggest()"></div><div><label>Prefixo</label><input id="prefix" maxlength="8" placeholder="SELF" oninput="upper(this)"></div><div><label>Valor</label><input id="price" inputmode="decimal" value="29,90"></div><div><label>Data</label><input id="date" type="date"></div></div><label>Cidade/local</label><input id="city" placeholder="Ex.: Natal/RN"><div style="margin-top:14px"><button class="btn primary" onclick="createEvent()">Criar evento</button></div><p class="muted">O link público será gerado automaticamente no formato: <strong>index.html?event=slug-do-evento</strong></p></div><div class="card"><h3>Eventos cadastrados</h3><div id="list"></div></div></div><script>
const SUPABASE_URL='https://tamldzilxnsaoxfpjugr.supabase.co';const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbWxkemlseG5zYW94ZnBqdWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODM5MzksImV4cCI6MjA5NjY1OTkzOX0.gZ3gaMpcNXWEPidv2U3mhvMfCMQfvk_aVHQLI_JbEjc';const db=supabase.createClient(SUPABASE_URL,KEY);let events=[];
async function requireLogin(){const{data}=await db.auth.getSession();if(!data.session){location.href='login.html';return false}return true}async function logout(){await db.auth.signOut();location.href='login.html'}function upper(el){el.value=el.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8)}function slugify(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}function suggest(){if(!prefix.value.trim()){const words=name.value.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().match(/[A-Z0-9]+/g)||[];prefix.value=(words.length===1?words[0].slice(0,4):words.map(w=>w[0]).join('').slice(0,5))}}
async function createEvent(){const n=name.value.trim();if(!n){showToast('Informe o nome');return}const slug=slugify(n);const p=(prefix.value.trim()||'DOT').toUpperCase();const val=Number(String(price.value).replace(',','.'))||29.90;const {error}=await db.from('events').insert({name:n,slug,code_prefix:p,base_price:val,city:city.value.trim()||null,event_date:date.value||null,is_active:true});if(error){showToast('Erro: '+error.message);return}showToast('Evento criado');name.value='';prefix.value='';city.value='';date.value='';price.value='29,90';loadEvents()}
async function toggleActive(id,current){const{error}=await db.from('events').update({is_active:!current}).eq('id',id);if(error){showToast('Erro ao atualizar');return}loadEvents()}
async function loadEvents(){const{data,error}=await db.from('events').select('*').order('created_at',{ascending:false});if(error){list.innerHTML='Erro: '+error.message;return}events=data||[];list.innerHTML=`<table><thead><tr><th>Evento</th><th>Prefixo</th><th>Valor</th><th>Status</th><th>Links</th><th></th></tr></thead><tbody>${events.map(e=>{const url=location.origin+location.pathname.replace('admin.html','index.html')+'?event='+encodeURIComponent(e.slug);return `<tr><td><strong>${e.name}</strong><br><span class="muted">${e.slug}</span></td><td>${e.code_prefix||'DOT'}</td><td>R$ ${Number(e.base_price).toFixed(2).replace('.',',')}</td><td><span class="pill">${e.is_active?'Ativo':'Inativo'}</span></td><td><a style="color:#fff" href="${url}" target="_blank">Cadastro</a></td><td><button class="btn ghost" onclick="toggleActive('${e.id}',${e.is_active})">${e.is_active?'Desativar':'Ativar'}</button></td></tr>`}).join('')}</tbody></table>`}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>toast.classList.remove('show'),1800)}requireLogin().then(ok=>{if(ok)loadEvents()});
</script></body></html>
