<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Painel dot.</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#070707;--card:#111;--line:#252525;--muted:#aaa;--text:#f5f5f5}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#1f1f1f,#070707 45%);color:var(--text);padding:20px}.box{width:100%;max-width:420px}.logo{font-size:34px;font-weight:900;letter-spacing:-1px}.sub{color:var(--muted);margin:6px 0 24px}.card{background:rgba(17,17,17,.94);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}label{display:block;margin:14px 0 6px;color:#ddd;font-size:14px}input{width:100%;padding:14px;border-radius:14px;border:1px solid #333;background:#090909;color:#fff;font-size:16px}.btn{width:100%;border:0;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:800;cursor:pointer;background:#fff;color:#000;margin-top:18px}.msg{margin-top:14px;color:#aaa;font-size:14px;line-height:1.4}.err{color:#ffb3b3}.ok{color:#9cffaa}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">dot.</div>
    <div class="sub">Acesso interno dos operadores</div>
    <div class="card">
      <label>E-mail</label>
      <input id="email" type="email" placeholder="operador@dotlaser.com.br" autocomplete="email" />
      <label>Senha</label>
      <input id="password" type="password" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()" />
      <button class="btn" onclick="login()">Entrar no painel</button>
      <div id="msg" class="msg">Use o usuário cadastrado no Supabase Auth.</div>
    </div>
  </div>
<script>
const SUPABASE_URL='https://tamldzilxnsaoxfpjugr.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbWxkemlseG5zYW94ZnBqdWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODM5MzksImV4cCI6MjA5NjY1OTkzOX0.gZ3gaMpcNXWEPidv2U3mhvMfCMQfvk_aVHQLI_JbEjc';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
async function check(){
  const {data}=await db.auth.getSession();
  if(data.session) window.location.href='painel.html';
}
async function login(){
  msg.className='msg'; msg.textContent='Entrando...';
  const {error}=await db.auth.signInWithPassword({email:email.value.trim(),password:password.value});
  if(error){ msg.className='msg err'; msg.textContent='Login não autorizado: '+error.message; return; }
  msg.className='msg ok'; msg.textContent='Acesso liberado. Abrindo painel...';
  window.location.href='painel.html';
}
check();
</script>
</body>
</html>
