<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel | dot.</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--bg:#08080a;--card:#111116;--muted:#a0a0aa;--text:#f5f5f7;--line:#24242c;--accent:#e7e7ea;--danger:#ff6b6b;--ok:#3ddc97}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#050506,#15151b);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
.logo{font-size:28px;font-weight:700;letter-spacing:-.04em}.logo span{color:#888}.card{background:rgba(17,17,22,.88);border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:18px;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric{background:#0c0c10;border:1px solid var(--line);border-radius:16px;padding:16px}.metric b{display:block;font-size:24px}.metric span{color:var(--muted);font-size:13px}
input,select{width:100%;background:#09090d;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:13px 14px;outline:none}label{font-size:13px;color:var(--muted);display:block;margin:10px 0 6px}
button,.btn{border:0;border-radius:14px;padding:12px 15px;background:#f2f2f3;color:#050506;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center}.btn2{background:#202027;color:#fff;border:1px solid var(--line)}.danger{background:#341a1d;color:#fff;border:1px solid #6b242d}.ok{background:#123323;color:#d8ffe9;border:1px solid #245d3d}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.muted{color:var(--muted)}.hidden{display:none!important}.order{border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;background:#0b0b0f}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 10px;color:#bbb;font-size:12px;margin-right:6px}.ath{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:12px 0;gap:10px}.toast{display:none;position:fixed;right:22px;bottom:22px;background:#121218;border:1px solid var(--line);padding:14px 16px;border-radius:16px;z-index:99}.toast.err{border-color:#7b2931;color:#ffd7d7}.toast.ok{border-color:#245d3d;color:#d8ffe9}
.debug{font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap;background:#050508;border:1px dashed #444;border-radius:16px;padding:14px;color:#ddd;font-size:12px}
@media(max-width:760px){.grid{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}.ath{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="logo">dot<span>.</span> painel</div><div class="muted" id="who"></div></div><div class="row"><a id="adminLink" class="btn btn2 hidden" href="admin.html">Administração</a><button class="btn2" onclick="logout()">Sair</button></div></div><div id="debugBox" class="card hidden"><b>Diagnóstico de acesso</b><pre id="debug" class="debug"></pre></div><div class="grid"><div class="metric"><b id="mPedidos">0</b><span>Pedidos ativos</span></div><div class="metric"><b id="mAtletas">0</b><span>Atletas</span></div><div class="metric"><b id="mGravados">0</b><span>Gravados</span></div><div class="metric adminOnly hidden"><b id="mReceita">R$ 0,00</b><span>Receita</span></div></div><div class="card"><div class="row"><input id="q" placeholder="Buscar por código, nome ou WhatsApp" oninput="render()"><select id="eventFilter" onchange="loadOrders()"><option value="">Todos os eventos</option></select><button class="btn2" onclick="loadOrders()">Atualizar</button></div></div><div id="orders"></div></div><div id="toast"></div><script>
const SUPABASE_URL = 'https://tamldzilxnsaoxfpjugr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbWxkemlseG5zYW94ZnBqdWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODM5MzksImV4cCI6MjA5NjY1OTkzOX0.gZ3gaMpcNXWEPidv2U3mhvMfCMQfvk_aVHQLI_JbEjc';
window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(msg, type='ok') {
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  el.className='toast '+type;
  el.textContent=msg;
  el.style.display='block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>el.style.display='none',2600);
}
async function requireLogin() {
  const { data, error } = await window.sb.auth.getUser();
  if(error || !data.user) {
    location.href = 'login.html';
    return null;
  }
  return data.user;
}
async function getProfile(user) {
  let { data, error } = await window.sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if((error || !data) && user.email) {
    const r = await window.sb.from('profiles').select('*').eq('email', user.email).maybeSingle();
    data = r.data; error = r.error;
  }
  return {profile:data, profileError:error};
}
async function logout() {
  await window.sb.auth.signOut();
  location.href='login.html';
}
function money(v){ return (Number(v||0)).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtLine(a){ return [a.medal_name || a.name || '', a.race_time || ''].filter(Boolean).join(' | '); }

let user=null, profile=null, role='operator', orders=[];
async function init(){
 user=await requireLogin(); if(!user) return;
 const r=await getProfile(user); profile=r.profile;
 role=(profile?.role||'operator').toLowerCase();
 document.getElementById('who').textContent=`${user.email} • ${role}`;
 document.getElementById('debugBox').classList.remove('hidden');
 document.getElementById('debug').textContent=JSON.stringify({user:{id:user.id,email:user.email},profile,profileError:r.profileError},null,2);
 if(role==='admin'){
   document.getElementById('adminLink').classList.remove('hidden');
   document.querySelectorAll('.adminOnly').forEach(e=>e.classList.remove('hidden'));
 }
 await loadEvents();
 await loadOrders();
}
async function loadEvents(){
 const {data}=await window.sb.from('events').select('id,name,code_prefix,is_active').order('created_at',{ascending:false});
 const sel=document.getElementById('eventFilter');
 (data||[]).forEach(ev=>{ const o=document.createElement('option'); o.value=ev.id; o.textContent=`${ev.name} (${ev.code_prefix||'DOT'})`; sel.appendChild(o); });
}
async function loadOrders(){
 let query=window.sb.from('orders').select('*, events(id,name,code_prefix), athletes(*)').eq('archived',false).order('created_at',{ascending:false});
 const ev=document.getElementById('eventFilter').value; if(ev) query=query.eq('event_id',ev);
 const {data,error}=await query;
 if(error){ showToast('Erro: '+error.message,'err'); return; }
 orders=data||[]; render();
}
function render(){
 const q=(document.getElementById('q').value||'').toUpperCase().trim();
 const filtered=orders.filter(o=>{
  const hay=[o.order_code,o.customer_name,o.customer_phone,o.events?.name,...(o.athletes||[]).map(a=>a.medal_name+' '+(a.race_time||''))].join(' ').toUpperCase();
  return !q || hay.includes(q);
 });
 let atletas=0,grav=0,receita=0;
 filtered.forEach(o=>{ atletas+=(o.athletes||[]).length; grav+=(o.athletes||[]).filter(a=>a.engraved).length; receita+=Number(o.total_amount||0); });
 mPedidos.textContent=filtered.length; mAtletas.textContent=atletas; mGravados.textContent=grav; if(document.getElementById('mReceita')) mReceita.textContent=money(receita);
 document.getElementById('orders').innerHTML=filtered.map(o=>`
  <div class="order"><div class="row" style="justify-content:space-between"><div><b>${o.order_code||o.id}</b><div class="muted">${o.events?.name||''} • ${o.customer_name||''} ${o.customer_phone? '• '+o.customer_phone:''}</div><div><span class="pill">${o.payment_status||'pendente'}</span><span class="pill">${o.status||'ativo'}</span>${role==='admin'?`<span class="pill">${money(o.total_amount)}</span>`:''}</div></div><div class="row">${role==='admin'?`<button class="danger" onclick="archiveOrder('${o.id}')">Arquivar</button>`:''}</div></div>
  <div>${(o.athletes||[]).map(a=>`<div class="ath"><div><b>${a.medal_name||''}</b><div class="muted">${a.race_time||'Tempo opcional não informado'}</div></div><div class="row"><button class="btn2" onclick="copyText('${(fmtLine(a)).replaceAll("'","\'")}')">Copiar</button><button class="${a.engraved?'ok':'btn2'}" onclick="markEngraved('${a.id}',${!a.engraved})">${a.engraved?'Gravado':'Marcar gravado'}</button></div></div>`).join('')}</div></div>`).join('') || '<div class="card muted">Nenhum pedido encontrado.</div>';
}
async function copyText(t){ await navigator.clipboard.writeText(t); showToast('Copiado'); }
async function markEngraved(id,value){ const {error}=await window.sb.from('athletes').update({engraved:value, engraved_at:value?new Date().toISOString():null}).eq('id',id); if(error) return showToast(error.message,'err'); await loadOrders(); }
async function archiveOrder(id){ if(!confirm('Arquivar este pedido?'))return; const {error}=await window.sb.from('orders').update({archived:true}).eq('id',id); if(error)return showToast(error.message,'err'); await loadOrders(); }
init();
</script></body></html>
