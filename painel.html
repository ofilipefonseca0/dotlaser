<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Painel dot. | Operação</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://unpkg.com/html5-qrcode"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:#070707;color:#f5f5f5;padding:20px}.wrap{max-width:1100px;margin:auto}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#fff;color:#000;border-radius:999px;padding:12px 18px;font-weight:800;box-shadow:0 12px 35px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:.22s;z-index:9999}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.logo{font-size:28px;font-weight:800}.card{background:#111;border:1px solid #252525;border-radius:18px;padding:16px;margin:14px 0}input,select{padding:14px;border-radius:12px;border:1px solid #333;background:#090909;color:#fff;font-size:16px;width:100%}.grid{display:grid;grid-template-columns:1.2fr .8fr .7fr .7fr;gap:10px}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}.primary{background:#fff;color:#000}.ghost{background:#222;color:#fff;border:1px solid #333}.ok{background:#11391d;color:#fff}.pill{display:inline-block;border:1px solid #333;border-radius:999px;padding:5px 10px;margin:3px;color:#ddd;font-size:13px}.ath{border-top:1px solid #262626;margin-top:12px;padding-top:12px;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.copytext{font-size:20px;font-weight:800}.muted{color:#aaa}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat strong{font-size:24px;display:block}.reader{display:none}.reader.show{display:block}.readerbox{max-width:420px;margin-top:12px;border-radius:16px;overflow:hidden;background:#000}.scan-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}@media(max-width:850px){.grid,.stats{grid-template-columns:1fr}.copytext{font-size:17px}}</style></head><body><div id="toast" class="toast">Copiado</div><div class="wrap"><div class="top"><div><div class="logo">dot. painel</div><div class="muted">Busca rápida para operadores <span id="userEmail"></span></div></div><div><a class="btn ghost" href="admin.html" style="text-decoration:none">Eventos</a> <button class="btn ghost" onclick="loadOrders()">Atualizar</button> <button class="btn ghost" onclick="logout()">Sair</button></div></div><div class="card stats" id="stats"></div><div class="card"><div class="grid"><input id="q" placeholder="Buscar por pedido, nome, telefone ou tempo" oninput="render()"/><select id="eventFilter" onchange="loadOrders()"><option value="">Todos eventos</option></select><select id="pay" onchange="render()"><option value="">Todos pagamentos</option><option value="pending">Pendente</option><option value="paid">Pago</option><option value="free">Gratuito</option></select><select id="eng" onchange="render()"><option value="">Todas gravações</option><option value="pending">Pendente</option><option value="partial">Parcial</option><option value="completed">Concluído</option></select></div><div class="scan-actions"><button class="btn primary" onclick="startScanner()">Ler QR Code</button><button class="btn ghost" onclick="stopScanner()">Fechar câmera</button></div><div id="readerWrap" class="reader"><div id="reader" class="readerbox"></div><div class="muted" style="margin-top:8px">Aponte a câmera para o QR Code do pedido.</div></div></div><div id="list"></div></div><script>
const SUPABASE_URL='https://tamldzilxnsaoxfpjugr.supabase.co';const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhbWxkemlseG5zYW94ZnBqdWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODM5MzksImV4cCI6MjA5NjY1OTkzOX0.gZ3gaMpcNXWEPidv2U3mhvMfCMQfvk_aVHQLI_JbEjc';const db=supabase.createClient(SUPABASE_URL,KEY);let rows=[],events=[],qrScanner=null;
async function startScanner(){readerWrap.classList.add('show');if(qrScanner)return;qrScanner=new Html5Qrcode('reader');try{await qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},async decoded=>{q.value=extractOrderCode(decoded.trim());showToast('QR Code lido');render();await stopScanner();})}catch(e){showToast('Não foi possível abrir a câmera');qrScanner=null}}
async function stopScanner(){readerWrap.classList.remove('show');if(qrScanner){try{await qrScanner.stop();await qrScanner.clear()}catch(e){}qrScanner=null}}
async function requireLogin(){const{data}=await db.auth.getSession();if(!data.session){location.href='login.html';return false}userEmail.textContent='• '+(data.session.user.email||'');return true}async function logout(){await db.auth.signOut();location.href='login.html'}
async function loadEvents(){const{data}=await db.from('events').select('*').order('created_at',{ascending:false});events=data||[];eventFilter.innerHTML='<option value="">Todos eventos</option>'+events.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}
async function loadOrders(){let query=db.from('orders').select('*, events(name,code_prefix), athletes(*)').order('created_at',{ascending:false}).limit(500);if(eventFilter.value)query=query.eq('event_id',eventFilter.value);const{data,error}=await query;if(error){list.innerHTML='<div class="card">Erro: '+error.message+'</div>';return}rows=data||[];render()}
function render(){const term=q.value.toLowerCase();const payv=pay.value;const engv=eng.value;let filtered=rows.filter(o=>{const txt=[o.order_code,o.customer_name,o.customer_phone,o.payment_status,o.engraving_status,o.events?.name,...(o.athletes||[]).flatMap(a=>[a.medal_name,a.race_time,engravingText(a)])].join(' ').toLowerCase();return(!term||txt.includes(term))&&(!payv||o.payment_status===payv)&&(!engv||o.engraving_status===engv)});stats.innerHTML=`<div class="stat card"><strong>${rows.length}</strong><span>Pedidos</span></div><div class="stat card"><strong>${rows.filter(o=>o.payment_status==='pending').length}</strong><span>Pendentes</span></div><div class="stat card"><strong>${rows.filter(o=>o.payment_status==='free'||o.payment_status==='paid').length}</strong><span>Liberados</span></div><div class="stat card"><strong>${rows.filter(o=>o.engraving_status==='completed').length}</strong><span>Gravados</span></div>`;list.innerHTML=filtered.map(orderCard).join('')||'<div class="card">Nenhum pedido encontrado.</div>'}
function engravingText(a){const name=a.medal_name||'';const time=a.race_time||'';return time?`${name} | ${time}`:name}function extractOrderCode(text){const m=String(text||'').match(/[A-Z]{2,8}-[A-Z0-9]{4,8}/i);return m?m[0].toUpperCase():text}
function orderCard(o){return `<div class="card"><div><strong>${o.order_code}</strong> <span class="pill">${o.events?.name||''}</span> <span class="pill">Pagamento: ${o.payment_status}</span> <span class="pill">Gravação: ${o.engraving_status}</span> <span class="pill">Total R$ ${Number(o.total).toFixed(2).replace('.',',')}</span></div><div class="muted">${o.customer_name||''} ${o.customer_phone||''}</div>${(o.athletes||[]).sort((a,b)=>a.athlete_index-b.athlete_index).map(a=>{const txt=engravingText(a);return `<div class="ath"><div><div class="copytext">${txt}</div><div class="muted">Atleta ${a.athlete_index} ${a.engraved?'• gravado':''}</div></div><div><button class="btn primary" onclick="copy('${txt.replace(/'/g,"\\'")}')">Copiar</button> <button class="btn ok" onclick="markAthlete('${o.id}','${a.id}')">Marcar gravado</button></div></div>`}).join('')}<div style="margin-top:12px"><button class="btn ghost" onclick="setPaid('${o.id}')">Marcar pago</button> <button class="btn ghost" onclick="completeOrder('${o.id}')">Concluir pedido</button></div></div>`}
async function copy(t){try{await navigator.clipboard.writeText(t);showToast('Copiado para gravação')}catch(e){showToast('Não foi possível copiar')}}function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>toast.classList.remove('show'),1600)}
async function setPaid(id){await db.from('orders').update({payment_status:'paid',updated_at:new Date().toISOString()}).eq('id',id);await loadOrders()}async function markAthlete(orderId,athleteId){const now=new Date().toISOString();const{error}=await db.from('athletes').update({engraved:true,engraved_at:now}).eq('id',athleteId);if(error){showToast('Erro ao marcar');return}await db.from('engraving_logs').insert({order_id:orderId,athlete_id:athleteId,operator_name:'Operador'});const{data:athletes}=await db.from('athletes').select('id,engraved').eq('order_id',orderId);if(athletes){const total=athletes.length,done=athletes.filter(a=>a.engraved).length,status=done===0?'pending':(done===total?'completed':'partial');await db.from('orders').update({engraving_status:status,updated_at:now}).eq('id',orderId)}showToast('Marcado como gravado');await loadOrders()}async function completeOrder(id){await db.from('orders').update({engraving_status:'completed',updated_at:new Date().toISOString()}).eq('id',id);await loadOrders()}
requireLogin().then(async ok=>{if(ok){await loadEvents();await loadOrders();setInterval(loadOrders,15000)}});
</script></body></html>
